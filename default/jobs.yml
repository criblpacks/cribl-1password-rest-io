1Password:
  type: collection
  ttl: 4h
  ignoreGroupJobsLimit: false
  removeFields: []
  resumeOnBoot: false
  schedule:
    cronSchedule: "*/5 * * * *"
    maxConcurrentRuns: 1
    skippable: true
    run:
      rescheduleDroppedTasks: true
      maxTaskReschedule: 1
      logLevel: info
      jobTimeout: 60m
      mode: run
      timeRangeType: relative
      timeWarning: {}
      expression: "true"
      minTaskSize: 1MB
      maxTaskSize: 10MB
      stateTracking:
        stateUpdateExpression: "__timestampExtracted !== false && {latestTime:
          (state.latestTime || 0) > _time ? state.latestTime : _time}"
        stateMergeExpression: "(prevState.latestTime || 0) > newState.latestTime ?
          prevState : newState"
        enabled: true
      earliest: -2d
      latest: now
    enabled: false
  streamtags: []
  workerAffinity: false
  collector:
    conf:
      discovery:
        discoverType: none
      collectMethod: post_with_body
      pagination:
        type: response_body
        maxPages: 50
        attribute:
          - cursor
          - has_more
        lastPageExpr: has_more === false
      authentication: none
      timeout: 0
      useRoundRobinDns: false
      disableTimeFilter: false
      decodeUrl: false
      rejectUnauthorized: true
      captureHeaders: false
      safeHeaders: []
      retryRules:
        type: backoff
        interval: 1000
        limit: 5
        multiplier: 2
        maxIntervalMs: 20000
        codes:
          - 429
          - 503
        enableHeader: true
        retryConnectTimeout: false
        retryConnectReset: false
        retryHeaderName: retry-after
      __scheduling:
        stateTracking: {}
      collectUrl: "'https://events.1password.com/api/v2/auditevents'"
      collectBody: >-
        {
            "limit": (cursor === NULL) ? 50 : NULL,
            "start_time": (cursor === NULL) ? `${C.Time.strftime(state.latestTime || earliest, '%Y-%m-%dT%H:%M:%S-00:00')}` : NULL,
            "end_time": (cursor === NULL) ? `${C.Time.strftime(latest || Date.now()/1000, '%Y-%m-%dT%H:%M:%S-00:00')}` : NULL,
            "cursor": cursor || NULL
        }
      collectRequestHeaders:
        - name: Content-Type
          value: "'application/json"
        - name: Authorization
          value: "'Bearer REPLACE_1PASS_BEARER_TOKEN'"
    destructive: false
    encoding: utf8
    type: rest
  input:
    type: collection
    staleChannelFlushMs: 10000
    sendToRoutes: true
    preprocess:
      disabled: true
    throttleRatePerSec: "0"
    breakerRulesets:
      - 1Password
    metadata:
      - name: __packsource
        value: "'cribl-1password-rest-io.1password'"

  description: This uses the 1Password Events API to retrieve information about
    activity in your 1Password account – like audit events, item usage, and
    sign-in attempts – and send it to your security information and event
    management (SIEM) system.
  savedState: {}
  notifications: []
